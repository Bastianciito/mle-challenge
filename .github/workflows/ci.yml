name: 'Continuous Integration'

env:
  SERVICE_NAME: mle-challenge-latam-service
  PROJECT_ID: project-bastian
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPOSITORY: mle-challenge-latam

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - 'release/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --group test

      - name: Run tests
        run: |
          source .venv/bin/activate
          make model-test
          make api-test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          if [[ "$BRANCH" == release/* ]]; then
            VERSION="${BRANCH#release/}"
            echo "tags=${IMAGE_URL}:${VERSION} ${IMAGE_URL}:${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_URL}:latest ${IMAGE_URL}:${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          TAG_ARGS=""
          for tag in $TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          docker build $TAG_ARGS -f Dockerfile .
          for tag in $TAGS; do
            docker push $tag
          done
