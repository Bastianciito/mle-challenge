name: 'Continuous Delivery'

env:
  SERVICE_NAME: mle-challenge-latam-service
  PROJECT_ID: project-bastian
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPOSITORY: mle-challenge-latam

on:
  push:
    branches:
      - develop
      - main
      - 'release/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          if [[ "$BRANCH" == release/* ]]; then
            VERSION="${BRANCH#release/}"
            echo "tags=${IMAGE_URL}:${VERSION} ${IMAGE_URL}:${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_URL}:latest ${IMAGE_URL}:${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          TAG_ARGS=""
          for tag in $TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          docker build $TAG_ARGS -f Dockerfile .
          for tag in $TAGS; do
            docker push $tag
          done
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve deploy target
        id: target
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ "$BRANCH" == release/* ]]; then
            VERSION="${BRANCH#release/}"
            VERSION_SLUG=$(echo "$VERSION" | tr '.' '-')
            echo "service=${{ env.SERVICE_NAME }}-${VERSION_SLUG}" >> $GITHUB_OUTPUT
            echo "image=${IMAGE_URL}:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "service=${{ env.SERVICE_NAME }}" >> $GITHUB_OUTPUT
            echo "image=${IMAGE_URL}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.target.outputs.service }} \
            --image ${{ steps.target.outputs.image }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --platform managed \
            --project ${{ env.PROJECT_ID }} \
            --memory 2Gi \
            --cpu 1
