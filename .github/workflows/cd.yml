name: 'Continuous Delivery'

env:
  SERVICE_NAME: mle-challenge-latam-service
  PROJECT_ID: project-bastian
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPOSITORY: mle-challenge-latam

on:
  push:
    branches:
      - develop
      - main
      - 'release/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      service: ${{ steps.resolve.outputs.service }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Resolve image tag and service name
        id: resolve
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"

          if [[ "$BRANCH" == release/* ]]; then
            VERSION="${BRANCH#release/}"
            VERSION_SLUG=$(echo "$VERSION" | tr '.' '-')
            echo "image=${BASE}:${VERSION}" >> $GITHUB_OUTPUT
            echo "service=${{ env.SERVICE_NAME }}-${VERSION_SLUG}" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "develop" ]]; then
            echo "image=${BASE}:${SHA}" >> $GITHUB_OUTPUT
            echo "service=${{ env.SERVICE_NAME }}-dev" >> $GITHUB_OUTPUT
          else
            echo "image=${BASE}:${SHA}" >> $GITHUB_OUTPUT
            echo "service=${{ env.SERVICE_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.resolve.outputs.image }} -f Dockerfile .
          docker push ${{ steps.resolve.outputs.image }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="prefix=mle-challenge/${{ needs.build-and-push.outputs.service }}"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="image=${{ needs.build-and-push.outputs.image }}" \
            -var="service_name=${{ needs.build-and-push.outputs.service }}"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="image=${{ needs.build-and-push.outputs.image }}" \
            -var="service_name=${{ needs.build-and-push.outputs.service }}"
